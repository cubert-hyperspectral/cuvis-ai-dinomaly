# Default gradient training (mirrors cuvis-ai/configs/training/default.yaml for standalone Hydra).
seed: 42

trainer:
  max_epochs: 5
  accelerator: "auto"
  devices: 1
  precision: "32-true"
  log_every_n_steps: 10
  val_check_interval: 1.0
  check_val_every_n_epoch: 1
  enable_progress_bar: true
  enable_checkpointing: true
  deterministic: false
  gradient_clip_val: 1.0
  callbacks:
    learning_rate_monitor:
      logging_interval: "epoch"
      log_momentum: false

optimizer:
  name: "adamw"
  lr: 0.001
  weight_decay: 0.01
  betas: [0.9, 0.999]
