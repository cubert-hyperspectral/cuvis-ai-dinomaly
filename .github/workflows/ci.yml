name: Continuous Integration

on:
  push:
    branches: [main]
    tags-ignore:
      - "v*.*.*"
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Focused Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run focused tests
        # `-m "not slow"` keeps `integration` enabled so the manifest-loading
        # smoke test (tests/test_plugin_manifest_loading.py) runs in CI, which
        # is the verification step required by the cuvis-ai-plugin skill.
        # `--no-sources` ignores the local-path overrides under
        # [tool.uv.sources] in pyproject.toml so PyPI/Git indexes are used.
        # `--locked` uses the committed uv.lock (generated with --no-sources)
        # to keep CI fully reproducible.
        run: |
          uv run --no-sources --locked --extra dev pytest tests/ -m "not slow" -v --tb=long -ra \
            --cov=cuvis_ai_dinomaly \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint:
    name: Focused Ruff Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check formatting
        run: uv run --no-sources --locked --extra dev ruff format --check cuvis_ai_dinomaly tests examples

      - name: Run ruff
        run: uv run --no-sources --locked --extra dev ruff check cuvis_ai_dinomaly tests examples

  typecheck:
    name: Type checking
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run mypy
        # Non-blocking: anomalib / torch stubs are incomplete; surface issues
        # without gating CI (matches cuvis-ai-adaclip pattern).
        run: uv run --no-sources --locked --extra dev mypy cuvis_ai_dinomaly/ || true

  security:
    name: Security scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run pip-audit
        # Non-blocking: anomalib==2.1.0 / kornia==0.6.12 may carry transient
        # CVEs we cannot patch without breaking compatibility.
        run: uv run --no-sources --locked --extra dev pip-audit --strict --desc on || true

      - name: Run detect-secrets
        run: uv run --no-sources --locked --extra dev detect-secrets scan --baseline .secrets.baseline

      - name: Run bandit
        run: uv run --no-sources --locked --extra dev bandit -r cuvis_ai_dinomaly/ -c pyproject.toml || true

  build:
    name: Build And Validate
    needs: [test, typecheck, lint, security]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build distributions
        run: uv build --no-sources

      - name: Validate distributions
        run: uv run --no-sources --with twine twine check dist/*
