name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Focused Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # Each import is its own step so the failing step's name in the
      # (auth-free) job summary directly identifies the broken import.
      - name: Diagnostic — import torch
        run: uv run --no-sources --extra dev python -c "import torch; print(torch.__version__)"
      - name: Diagnostic — import requests
        run: uv run --no-sources --extra dev python -c "import requests; print(requests.__version__)"
      - name: Diagnostic — import anomalib
        run: uv run --no-sources --extra dev python -c "import anomalib; print(anomalib.__version__)"
      - name: Diagnostic — import anomalib.models
        run: uv run --no-sources --extra dev python -c "import anomalib.models"
      - name: Diagnostic — import DinomalyModel
        run: uv run --no-sources --extra dev python -c "from anomalib.models.image.dinomaly.torch_model import DinomalyModel"
      - name: Diagnostic — import cuvis_ai_core
        run: uv run --no-sources --extra dev python -c "import cuvis_ai_core"
      - name: Diagnostic — import cuvis_ai
        run: uv run --no-sources --extra dev python -c "import cuvis_ai"
      - name: Diagnostic — import DinomalyDetector
        run: uv run --no-sources --extra dev python -c "from cuvis_ai_dinomaly.node.dinomaly_detector import DinomalyDetector"

      - name: Run focused tests
        # `-m "not slow"` keeps `integration` enabled so the manifest-loading
        # smoke test (tests/test_plugin_manifest_loading.py) runs in CI, which
        # is the verification step required by the cuvis-ai-plugin skill.
        # `--no-sources` ignores the local-path overrides under
        # [tool.uv.sources] in pyproject.toml so PyPI/Git indexes are used.
        # `--locked` is intentionally omitted: the committed uv.lock was
        # generated with local [tool.uv.sources] paths active, which conflicts
        # with --no-sources. Re-add --locked once the lock is regenerated
        # against the public indexes.
        run: uv run --no-sources --extra dev pytest tests/ -m "not slow" -v --tb=long -ra

  lint:
    name: Focused Ruff Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check formatting
        run: uv run --no-sources --extra dev ruff format --check cuvis_ai_dinomaly tests examples

      - name: Run ruff
        run: uv run --no-sources --extra dev ruff check cuvis_ai_dinomaly tests examples

  build:
    name: Build And Validate
    needs: [test, lint]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build distributions
        run: uv build --no-sources

      - name: Validate distributions
        run: uv run --no-sources --with twine twine check dist/*
